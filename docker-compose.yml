version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trainerlink_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trainerlink
      POSTGRES_PASSWORD: trainerlink
      POSTGRES_DB: trainerlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
